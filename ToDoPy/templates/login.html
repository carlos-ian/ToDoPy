<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoPy - Login</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilo rápido para centralizar o card de login */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; font-family: sans-serif; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-container h2 { color: #333; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #666; }
        .input-group input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 1rem; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .btn-login:hover { background: #27ae60; }
        .error-msg { color: #e74c3c; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo" style="font-size: 2rem; color: #2ecc71; margin-bottom: 1rem;">
            <i class="fas fa-clipboard-check"></i>
            <span style="color: #333; font-weight: bold;">ToDoPy</span>
        </div>
        <h2>Acesse sua conta</h2>
        
        <form id="login-form">
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="******" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
            <div id="error-message" class="error-msg">E-mail ou senha incorretos!</div>
        </form>
    </div>

    <script>
        // MUDANÇA CRUCIAL: Use o link do seu Render aqui
        const API_BASE_URL = "https://todopy.onrender.com";

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                // Criando o form-data para o OAuth2 do FastAPI
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch(`${API_BASE_URL}/token`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Salva o token e redireciona para a rota limpa
                    localStorage.setItem('token', data.access_token);
                    window.location.href = "/dashboard";
                } else {
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error("Erro na conexão:", error);
                alert("Erro ao conectar com o servidor.");
            }
        });

        // Se já tiver token válido, pula para o dashboard automaticamente
        if (localStorage.getItem('token')) {
            window.location.href = "/dashboard";
        }
    </script>
</body>
</html>
